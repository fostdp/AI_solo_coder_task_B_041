<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大型水电站水轮机空化噪声监测与寿命评估系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="18" fill="#1e3a5f" stroke="#00d4ff" stroke-width="2"/>
                    <path d="M20 5 L25 20 L20 35 L15 20 Z" fill="#00d4ff" opacity="0.8"/>
                    <circle cx="20" cy="20" r="6" fill="#1e3a5f" stroke="#00d4ff" stroke-width="2"/>
                </svg>
                <h1>水轮机空化噪声监测与寿命评估系统</h1>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-label">在线机组</span>
                    <span class="stat-value" id="onlineTurbines">6/6</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">活跃告警</span>
                    <span class="stat-value alarm" id="activeAlarms">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">系统时间</span>
                    <span class="stat-value" id="systemTime">--:--:--</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>机组列表</h3>
                    <div class="turbine-list" id="turbineList"></div>
                </div>
                <div class="sidebar-section">
                    <h3>空化状态图例</h3>
                    <div class="legend">
                        <div class="legend-item">
                            <span class="legend-color normal"></span>
                            <span>正常</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color incipient"></span>
                            <span>初生空化</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color critical"></span>
                            <span>临界空化</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color developed"></span>
                            <span>发展空化</span>
                        </div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <h3>传感器状态</h3>
                    <div class="sensor-stats" id="sensorStats">
                        <div class="sensor-stat">
                            <span class="sensor-name">水听器</span>
                            <span class="sensor-count">72/72</span>
                        </div>
                        <div class="sensor-stat">
                            <span class="sensor-name">加速度计</span>
                            <span class="sensor-count">48/48</span>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="content-area">
                <div class="view-tabs">
                    <button class="tab-btn active" data-tab="turbine-view">水轮机视图</button>
                    <button class="tab-btn" data-tab="waterfall-view">瀑布图</button>
                    <button class="tab-btn" data-tab="alarm-view">告警信息</button>
                    <button class="tab-btn" data-tab="control-view">调节控制</button>
                    <button class="tab-btn" data-tab="robot-view">机器人检修</button>
                    <button class="tab-btn" data-tab="schedule-view">优化调度</button>
                    <button class="tab-btn" data-tab="diagnosis-view">声纹诊断</button>
                </div>

                <div class="tab-content active" id="turbine-view">
                    <div class="turbine-container">
                        <canvas id="turbineCanvas"></canvas>
                        <div class="turbine-info-overlay">
                            <div class="info-card">
                                <h4 id="currentTurbineName">1# 水轮机</h4>
                                <div class="info-row">
                                    <span>空化状态</span>
                                    <span class="status-badge normal" id="cavitationStatus">正常</span>
                                </div>
                                <div class="info-row">
                                    <span>最大空化强度</span>
                                    <span id="maxCavitation">0.12</span>
                                </div>
                                <div class="info-row">
                                    <span>最大振动</span>
                                    <span id="maxVibration">0.08 g</span>
                                </div>
                                <div class="info-row">
                                    <span>剩余寿命</span>
                                    <span id="remainingLife">98.5%</span>
                                </div>
                            </div>
                        </div>
                        <div class="blade-tooltip" id="bladeTooltip"></div>
                    </div>
                </div>

                <div class="tab-content" id="waterfall-view">
                    <div class="waterfall-container">
                        <div class="waterfall-header">
                            <select id="sensorSelect">
                                <option value="hydrophone_0">蜗壳进口 - 水听器1</option>
                            </select>
                            <div class="freq-range">
                                <span>频率范围: 0 - <span id="freqMax">25600</span> Hz</span>
                            </div>
                        </div>
                        <canvas id="waterfallCanvas"></canvas>
                        <div class="waterfall-controls">
                            <button id="pauseBtn">暂停</button>
                            <button id="clearBtn">清除</button>
                            <span class="time-info">时间跨度: <span id="timeSpan">60</span>s</span>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="alarm-view">
                    <div class="alarm-container">
                        <div class="alarm-header">
                            <h3>告警信息</h3>
                            <div class="alarm-filters">
                                <button class="filter-btn active" data-filter="all">全部</button>
                                <button class="filter-btn" data-filter="active">活动</button>
                                <button class="filter-btn" data-filter="acknowledged">已确认</button>
                            </div>
                        </div>
                        <div class="alarm-list" id="alarmList"></div>
                    </div>
                </div>

                <div class="tab-content" id="control-view">
                    <div id="controlTabContainer" style="flex:1;display:flex;"></div>
                </div>

                <div class="tab-content" id="robot-view">
                    <div id="robotTabContainer" style="flex:1;display:flex;"></div>
                </div>

                <div class="tab-content" id="schedule-view">
                    <div id="scheduleTabContainer" style="flex:1;display:flex;"></div>
                </div>

                <div class="tab-content" id="diagnosis-view">
                    <div id="diagnosisTabContainer" style="flex:1;display:flex;"></div>
                </div>
            </main>

            <aside class="right-panel">
                <div class="panel-section">
                    <h3>叶片详情</h3>
                    <div class="blade-detail" id="bladeDetail">
                        <p class="hint">点击叶片查看详细信息</p>
                    </div>
                </div>
                <div class="panel-section">
                    <h3>空化强度趋势</h3>
                    <canvas id="trendCanvas" width="300" height="150"></canvas>
                </div>
                <div class="panel-section">
                    <h3>寿命评估</h3>
                    <div class="life-assessment" id="lifeAssessment">
                        <div class="life-gauge">
                            <svg viewBox="0 0 100 100" class="gauge-svg">
                                <circle cx="50" cy="50" r="40" fill="none" stroke="#1e3a5f" stroke-width="8"/>
                                <circle cx="50" cy="50" r="40" fill="none" stroke="#00d4ff" stroke-width="8"
                                    stroke-dasharray="251.2" stroke-dashoffset="3.77"
                                    transform="rotate(-90 50 50)" id="lifeArc"/>
                                <text x="50" y="45" text-anchor="middle" class="gauge-value" id="lifeValue">98.5%</text>
                                <text x="50" y="65" text-anchor="middle" class="gauge-label">剩余寿命</text>
                            </svg>
                        </div>
                        <div class="life-details">
                            <div class="life-row">
                                <span>累计损伤</span>
                                <span id="cumulativeDamage">0.015</span>
                            </div>
                            <div class="life-row">
                                <span>当前损伤率</span>
                                <span id="damageRate">1.2e-6 /h</span>
                            </div>
                            <div class="life-row">
                                <span>预计剩余时间</span>
                                <span id="remainingTime">8.5 年</span>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <div class="modal" id="bladeModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">叶片详情</h3>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <script src="js/turbine_3d_viewer.js"></script>
    <script src="js/blade_detail.js"></script>
    <script src="js/waterfall_chart.js"></script>
    <script src="js/mpc_control_tab.js"></script>
    <script src="js/robot_repair_tab.js"></script>
    <script src="js/unit_schedule_tab.js"></script>
    <script src="js/acoustic_diagnosis_tab.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
