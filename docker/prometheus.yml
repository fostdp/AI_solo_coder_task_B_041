global:
  scrape_interval: 5s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'pxi_collector'
    static_configs:
      - targets: ['pxi_collector:9100']
    metrics_path: /metrics

  - job_name: 'cavitation_detector'
    static_configs:
      - targets: ['cavitation_detector:9100']

  - job_name: 'fatigue_evaluator'
    static_configs:
      - targets: ['fatigue_evaluator:9100']

  - job_name: 'alarm_pusher'
    static_configs:
      - targets: ['alarm_pusher:9100']

  - job_name: 'api_gateway'
    static_configs:
      - targets: ['api_gateway:9100']

  - job_name: 'turbine_controller'
    static_configs:
      - targets: ['turbine_controller:9100']

  - job_name: 'robot_planner'
    static_configs:
      - targets: ['robot_planner:9100']

  - job_name: 'unit_scheduler'
    static_configs:
      - targets: ['unit_scheduler:9100']

  - job_name: 'acoustic_diagnosis'
    static_configs:
      - targets: ['acoustic_diagnosis:9100']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
